apiVersion: v1
kind: Namespace
metadata:
  name: teslamate
---
# 非敏感配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: teslamate-fixer-config
  namespace: teslamate
data:
  DB_HOST: "database"
  DB_PORT: "5432"
  DB_NAME: "teslamate"
  DB_USER: "teslamate"
  DAYS_TO_FIX: "7"
  BATCH_SIZE: "2"
  LIMIT_PER_RUN: ""
  API_DELAY: "1.0"
  LOG_LEVEL: "INFO"
  LOG_FILE: "/var/log/teslamate/fixer.log"
  CRON_SCHEDULE: "0 2 * * *"
  RUN_ON_STARTUP: "true"
  TZ: "Asia/Shanghai"
---
# 敏感配置 — 部署前请替换为实际值
apiVersion: v1
kind: Secret
metadata:
  name: teslamate-fixer-secret
  namespace: teslamate
type: Opaque
stringData:
  DB_PASS: "<YOUR_DB_PASSWORD>"
  BAIDU_AK: "<YOUR_BAIDU_AK>"
  BAIDU_SK: "<YOUR_BAIDU_SK>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate-address-fixer
  namespace: teslamate
  labels:
    app: teslamate-address-fixer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate-address-fixer
  template:
    metadata:
      labels:
        app: teslamate-address-fixer
    spec:
      containers:
        - name: fixer
          image: ericality/teslamate-fixer:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: teslamate-fixer-config
            - secretRef:
                name: teslamate-fixer-secret
          resources:
            limits:
              memory: 256Mi
              cpu: 500m
            requests:
              memory: 128Mi
              cpu: 100m
          volumeMounts:
            - name: log-volume
              mountPath: /var/log/teslamate
      volumes:
        - name: log-volume
          emptyDir: {}
      restartPolicy: Always